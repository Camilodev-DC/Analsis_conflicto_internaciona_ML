<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelligence Center | Conflict Analysis ML</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --p: 139, 92, 246;
      --s: 59, 130, 246;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030712;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #fff;
      height: 100vh;
      width: 100%;
    }

    /* ── HERO WRAPPER ── */
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── LAYER 0: PANNING GRID ── */
    .grid-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image:
        repeating-linear-gradient(to right, rgba(10,10,10,.9) 1px, transparent 1px),
        repeating-linear-gradient(to bottom, rgba(10,10,10,.9) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .15;
      animation: panGrid 180s linear infinite;
    }
    @keyframes panGrid {
      from { background-position: 0 0; }
      to   { background-position: 400px 400px; }
    }

    /* ── LAYER 1: VOLUMETRIC HAZE ── */
    .haze-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: radial-gradient(circle at 50% 50%, rgba(var(--p),.15) 0%, transparent 50%);
      filter: blur(150px);
      opacity: .6;
      mix-blend-mode: screen;
    }

    /* ── LAYER 2: DEEP BASE ── */
    .base-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: radial-gradient(at 50% 50%, rgba(var(--p),.08) 0%, #030712 90%);
    }

    /* ── CORE LIGHT ── */
    .core-light {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--s),.45) 0%, transparent 70%);
      filter: blur(200px);
      box-shadow:
        0 0 100px 30px rgba(var(--s),.2),
        0 0 200px 50px rgba(var(--p),.15);
      pointer-events: none;
      animation: corePulse 25s ease-in-out infinite;
    }
    @keyframes corePulse {
      0%,100% { opacity:.8; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
    }

    /* ── LAYER 3: SPHERE ── */
    .sphere-wrapper {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      pointer-events: none;
      transform-style: preserve-3d;
    }
    .sphere-spin {
      width: 700px; height: 700px;
      position: relative;
      transform-style: preserve-3d;
      animation: rotateSphere 240s linear infinite;
    }
    @keyframes rotateSphere {
      from { transform: rotateX(20deg) rotateY(0deg); }
      to   { transform: rotateX(20deg) rotateY(360deg); }
    }
    .ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 700px; height: 700px;
      margin: -350px 0 0 -350px;
      border-radius: 50%;
      border: 1px solid rgba(var(--p), .75);
      box-shadow:
        0 0 70px rgba(var(--p),.3),
        inset 0 0 70px rgba(var(--p),.1);
      transform-style: preserve-3d;
    }

    /* ── LAYER 4: BLOOM ── */
    .bloom-layer {
      position: absolute;
      inset: 0;
      z-index: 11;
      background:
        radial-gradient(circle at 50% 50%, rgba(var(--p),.35) 0%, transparent 50%),
        radial-gradient(circle at 10% 10%, rgba(var(--s),.25) 0%, transparent 30%);
      mix-blend-mode: screen;
      filter: blur(100px);
      opacity: .95;
    }

    /* ── LAYER 5: NOISE ── */
    .noise-layer {
      position: absolute;
      inset: 0;
      z-index: 12;
      opacity: .04;
      mix-blend-mode: overlay;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* ── LAYER 6: VIGNETTE ── */
    .vignette {
      position: absolute;
      inset: 0;
      z-index: 18;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(3,7,18,.85) 100%);
      pointer-events: none;
    }

    /* ── HERO CONTENT ── */
    .hero-content {
      position: relative;
      z-index: 20;
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 1.2rem;
    }

    .hero-gradient {
      background: linear-gradient(135deg,
        rgb(var(--p)) 0%,
        rgb(var(--s)) 50%,
        #fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 1.05rem;
      line-height: 1.75;
      font-weight: 300;
      opacity: .68;
      max-width: 580px;
      margin: 0 auto 2.5rem;
      letter-spacing: .3px;
    }

    .hero-cta {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── HOLOGRAPHIC CRYSTAL BUTTONS ── */
    .btn-holo {
      position: relative;
      padding: 1rem 2.5rem;
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      letter-spacing: .6px;
      color: #fff;
      cursor: pointer;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg,
        rgba(var(--p), .15) 0%,
        rgba(var(--s), .1) 50%,
        rgba(var(--p), .15) 100%);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
      transition: transform .35s ease, box-shadow .35s ease;
      z-index: 1;
    }

    /* Holographic rainbow border */
    .btn-holo::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      padding: 1.5px;
      background: linear-gradient(
        135deg,
        rgba(var(--p),  .8),
        rgba(var(--s),  .6),
        rgba(16, 185, 129, .5),
        rgba(245, 158, 11, .4),
        rgba(var(--p),  .8)
      );
      background-size: 300% 300%;
      animation: holoBorder 4s ease infinite;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Inner prismatic shimmer */
    .btn-holo::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: conic-gradient(
        from 0deg,
        transparent,
        rgba(var(--p), .08),
        transparent,
        rgba(var(--s), .06),
        transparent
      );
      animation: holoShimmer 6s linear infinite;
      pointer-events: none;
    }

    @keyframes holoBorder {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes holoShimmer {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .btn-holo:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow:
        0 0 25px rgba(var(--p), .5),
        0 0 60px rgba(var(--s), .25),
        inset 0 0 20px rgba(var(--p), .1);
    }

    .btn-holo .btn-label {
      position: relative;
      z-index: 2;
    }

    /* Icon inside button */
    .btn-holo .btn-icon {
      display: inline-block;
      margin-right: .5rem;
      font-size: 1.1rem;
      vertical-align: middle;
    }

    /* Badge */
    .badge {
      display: inline-block;
      margin-bottom: 1.4rem;
      padding: .35rem 1rem;
      border: 1px solid rgba(var(--p),.4);
      border-radius: 999px;
      font-size: .75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(var(--p),1);
      background: rgba(var(--p),.08);
    }

    /* ── INTRO BLACKOUT ── */
    .blackout {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      opacity: 1;
      transition: opacity 2.5s ease;
    }
    .blackout.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* ── STAGGERED CONTENT REVEAL ── */
    .hero-content .badge,
    .hero-content .hero-title,
    .hero-content .hero-sub,
    .hero-content .hero-cta {
      opacity: 0;
      transform: translateY(25px);
      transition: opacity 1.4s ease, transform 1.4s ease;
    }
    .hero-content.revealed .badge      { opacity: 1; transform: translateY(0); transition-delay: 0s; }
    .hero-content.revealed .hero-title  { opacity: 1; transform: translateY(0); transition-delay: .35s; }
    .hero-content.revealed .hero-sub    { opacity: 1; transform: translateY(0); transition-delay: .7s; }
    .hero-content.revealed .hero-cta    { opacity: 1; transform: translateY(0); transition-delay: 1.05s; }
  </style>
</head>
<body>
<div class="hero" id="hero">

  <!-- L0 Grid -->
  <div class="grid-layer" id="gridLayer"></div>

  <!-- L1 Haze -->
  <div class="haze-layer" id="hazeLayer"></div>

  <!-- L2 Base + Core -->
  <div class="base-layer" id="baseLayer">
    <div class="core-light"></div>
  </div>

  <!-- L3 Sphere -->
  <div class="sphere-wrapper" id="sphereWrapper">
    <div class="sphere-spin" id="sphereSpin"></div>
  </div>

  <!-- L4 Bloom -->
  <div class="bloom-layer" id="bloomLayer"></div>

  <!-- L5 Noise -->
  <div class="noise-layer"></div>

  <!-- L6 Vignette -->
  <div class="vignette"></div>

  <!-- Blackout overlay -->
  <div class="blackout" id="blackout"></div>

  <!-- Hero Content -->
  <div class="hero-content" id="heroContent">
    <div class="badge">ML · Geopolitical Intelligence · 2024–2026</div>
    <h1 class="hero-title">
      <span class="hero-gradient">Vector Intelligence</span>
    </h1>
    <p class="hero-sub">
      Análisis predictivo de conflictos internacionales mediante modelos de aprendizaje automático.
      Inteligencia estratégica, redefinida.
    </p>
    <div class="hero-cta">
      <button class="btn-holo" id="btnModels"><span class="btn-icon">◈</span><span class="btn-label">Explorar Modelos</span></button>
      <button class="btn-holo" id="btnSim"><span class="btn-icon">⬡</span><span class="btn-label">Simulador</span></button>
    </div>
  </div>

</div>

<script>
  /* ── CONFIG ── */
  const CFG = {
    primaryColor   : "139, 92, 246",
    secondaryColor : "59, 130, 246",
    parallaxDepth  : 35,
    lerpFactor     : 0.08,
    sphereDensity  : 12,
  };

  /* ── BUILD SPHERE RINGS ── */
  const spin = document.getElementById('sphereSpin');
  const step = 90 / (CFG.sphereDensity / 2);
  for (let i = 0; i < CFG.sphereDensity; i++) {
    const angle = i * step;
    const ring = document.createElement('div');
    ring.className = 'ring';
    ring.setAttribute('aria-hidden', 'true');
    ring.style.transform = i % 2 === 0
      ? `rotateY(${angle}deg)`
      : `rotateX(${angle}deg)`;
    spin.appendChild(ring);
  }

  /* ── MOUSE PARALLAX WITH LERP ── */
  let tX = 0, tY = 0, cX = 0, cY = 0;

  window.addEventListener('mousemove', e => {
    tX = (e.clientX - innerWidth  / 2) / (innerWidth  / 2);
    tY = (e.clientY - innerHeight / 2) / (innerHeight / 2);
  });

  const gridLayer    = document.getElementById('gridLayer');
  const hazeLayer    = document.getElementById('hazeLayer');
  const baseLayer    = document.getElementById('baseLayer');
  const sphereWrapper= document.getElementById('sphereWrapper');
  const bloomLayer   = document.getElementById('bloomLayer');

  function lerp(a, b, t) { return a + (b - a) * t; }

  function tick() {
    cX = lerp(cX, tX, CFG.lerpFactor);
    cY = lerp(cY, tY, CFG.lerpFactor);

    const d  = CFG.parallaxDepth;
    const h  = d / 2;
    const rX = cY * 5;
    const rY = -cX * 5;

    gridLayer.style.transform     = `translate3d(${-cX*h}px, ${-cY*h}px, 0)`;
    hazeLayer.style.transform     = `translate3d(${cX*h}px,  ${cY*h}px,  0)`;
    baseLayer.style.transform     = `translate3d(${cX*d}px,  ${cY*d}px,  0)`;
    bloomLayer.style.transform    = `translate3d(${cX*d}px,  ${cY*d}px,  0)`;
    sphereWrapper.style.transform = `translate(-50%, -50%) rotateX(${rX}deg) rotateY(${rY}deg)`;

    requestAnimationFrame(tick);
  }
  tick();

  /* ── INTRO SEQUENCE ── */
  window.addEventListener('DOMContentLoaded', () => {
    const blackout    = document.getElementById('blackout');
    const heroContent = document.getElementById('heroContent');

    // 1) After 1s → fade out black overlay (reveals sphere + scene)
    setTimeout(() => blackout.classList.add('fade-out'), 1000);

    // 2) After 2.8s → reveal text elements with stagger
    setTimeout(() => heroContent.classList.add('revealed'), 2800);
  });
</script>
</body>
</html>
